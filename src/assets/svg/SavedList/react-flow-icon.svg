<svg
  xmlns="http://www.w3.org/2000/svg"
  width="48"
  height="48"
  viewBox="0 0 48 48"
>
  <!-- Circular background (orange) -->
  <circle cx="24" cy="24" r="24" fill="red" />

  <!-- Three small white circles (nodes) -->
  <circle cx="18" cy="18" r="4" fill="#FFFFFF" />
  <circle cx="30" cy="18" r="4" fill="#FFFFFF" />
  <circle cx="24" cy="30" r="4" fill="#FFFFFF" />

  <!-- Lines connecting them -->
  <line x1="18" y1="18" x2="30" y2="18" stroke="#FFFFFF" stroke-width="2" />
  <line x1="24" y1="30" x2="30" y2="18" stroke="#FFFFFF" stroke-width="2" />
  <line x1="24" y1="30" x2="18" y2="18" stroke="#FFFFFF" stroke-width="2" />
</svg>
